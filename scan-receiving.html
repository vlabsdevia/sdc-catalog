<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Receiving Station — SDC Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: #f8f8f8;
  color: #333;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: #111;
  color: #fff;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.header-back {
  color: #999;
  text-decoration: none;
  font-size: 14px;
  transition: color .2s;
}
.header-back:hover { color: #fff; }

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: #fff;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #111;
  flex-shrink: 0;
}

.brand-text {
  line-height: 1.2;
}
.brand-text .primary { font-weight: 600; font-size: 14px; }
.brand-text .secondary { font-size: 11px; color: #999; }

.header-title {
  font-size: 18px;
  font-weight: 600;
  margin-left: 8px;
  white-space: nowrap;
}

.header-spacer { flex: 1; }

.session-name-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,.4);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 4px 2px;
  width: 200px;
  outline: none;
  transition: border-color .2s;
}
.session-name-input:focus {
  border-bottom-color: #fff;
}
.session-name-input::placeholder { color: #666; }

.btn-new-session {
  background: transparent;
  color: #fff;
  border: 1px solid rgba(255,255,255,.5);
  border-radius: 100px;
  padding: 6px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, border-color .2s;
  white-space: nowrap;
}
.btn-new-session:hover {
  background: rgba(255,255,255,.1);
  border-color: #fff;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #999;
  white-space: nowrap;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #666;
  transition: background .2s;
}
.status-dot.active { background: #16a34a; }

/* ── Tab Bar ── */
.tab-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #fff;
  display: flex;
  border-bottom: 1px solid #e5e5e5;
  padding: 0 24px;
}

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #666;
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
.tab-btn:hover { color: #111; }
.tab-btn.active {
  color: #111;
  border-bottom-color: #111;
}

/* ── Tab Content ── */
.tab-content { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── Scan Tab ── */
.scan-input-wrap {
  position: relative;
  margin-bottom: 20px;
}

.scan-input {
  width: 100%;
  padding: 18px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  border: 2px solid #e5e5e5;
  border-radius: 12px;
  outline: none;
  background: #fff;
  transition: border-color .2s;
}
.scan-input:focus {
  border-color: #111;
}
.scan-input::placeholder { color: #bbb; }

.scan-flash {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s ease;
}
.scan-flash.success { background: rgba(22, 163, 74, .2); }
.scan-flash.error { background: rgba(220, 38, 38, .2); }
.scan-flash.show { opacity: 1; }

/* Stats bar */
.scan-stats {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 12px 0;
  border-bottom: 1px solid #e5e5e5;
  margin-bottom: 16px;
  font-size: 14px;
  color: #666;
}
.scan-stats strong { color: #111; font-weight: 600; }
.scan-stats .spacer { flex: 1; }

.btn-clear {
  background: none;
  border: 1px solid #e5e5e5;
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.btn-clear:hover { border-color: #dc2626; color: #dc2626; }

/* Scan log */
.scan-log { list-style: none; }

.scan-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 14px;
  animation: fadeIn .2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.scan-time {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  color: #999;
  flex-shrink: 0;
}

.scan-sku {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 700;
  font-size: 13px;
  color: #111;
  flex-shrink: 0;
}

.scan-name {
  color: #333;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.scan-count-badge {
  background: #111;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 100px;
  flex-shrink: 0;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #999;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── Summary Tab ── */
.summary-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.summary-header h2 { font-size: 16px; font-weight: 600; }

.btn-export {
  background: #111;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s;
}
.btn-export:hover { background: #333; }

.summary-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.summary-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: #666;
  background: #fafafa;
  border-bottom: 1px solid #e5e5e5;
}

.summary-table td {
  padding: 10px 16px;
  font-size: 13px;
  border-bottom: 1px solid #f0f0f0;
}

.summary-table tr:last-child td { border-bottom: none; }

.summary-table .total-row td {
  font-weight: 600;
  background: #fafafa;
  border-top: 2px solid #e5e5e5;
}

.summary-table .sku-cell {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 600;
  font-size: 12px;
}

.summary-table .time-cell {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  color: #666;
}

/* ── History Tab ── */
.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.history-header h2 { font-size: 16px; font-weight: 600; }

.session-card {
  background: #fff;
  border-radius: 12px;
  margin-bottom: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  overflow: hidden;
}

.session-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.session-card-header:hover { background: #fafafa; }

.session-card-header .arrow {
  font-size: 12px;
  color: #999;
  transition: transform .2s;
  flex-shrink: 0;
}
.session-card.expanded .arrow { transform: rotate(90deg); }

.session-card-header .session-title {
  font-weight: 600;
  font-size: 14px;
  flex: 1;
}

.session-card-header .session-meta {
  font-size: 12px;
  color: #666;
  display: flex;
  gap: 12px;
  align-items: center;
}

.badge-active {
  background: #16a34a;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.session-card-body {
  display: none;
  padding: 0 18px 16px;
}
.session-card.expanded .session-card-body { display: block; }

.session-card-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.btn-sm {
  padding: 6px 14px;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid #e5e5e5;
  background: #fff;
  color: #333;
  transition: all .15s;
}
.btn-sm:hover { border-color: #999; }
.btn-sm.danger { color: #dc2626; }
.btn-sm.danger:hover { border-color: #dc2626; background: #fef2f2; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <a href="index.html" class="header-back">&larr; Back</a>
  <div class="header-brand">
    <div class="logo-mark">SDC</div>
    <div class="brand-text">
      <div class="primary">SDC Solutions</div>
      <div class="secondary">Sabores del Campo LLC</div>
    </div>
  </div>
  <div class="header-title">Scan Receiving Station</div>
  <div class="header-spacer"></div>
  <input type="text" class="session-name-input" id="session-name" placeholder="Session name..." spellcheck="false">
  <button class="btn-new-session" onclick="newSession()">New Session</button>
  <div class="status-indicator">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Click to activate</span>
  </div>
</header>

<!-- ── Tab Bar ── -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="scan" onclick="switchTab('scan')">Scan</button>
  <button class="tab-btn" data-tab="summary" onclick="switchTab('summary')">Summary</button>
  <button class="tab-btn" data-tab="history" onclick="switchTab('history')">History</button>
</nav>

<!-- ── Scan Tab ── -->
<div class="tab-content active" id="tab-scan">
  <div class="scan-input-wrap">
    <input type="text" class="scan-input" id="scan-input" placeholder="Scan QR code..." autocomplete="off" spellcheck="false">
    <div class="scan-flash" id="scan-flash"></div>
  </div>
  <div class="scan-stats">
    <span>Total scans: <strong id="stat-total">0</strong></span>
    <span>Unique products: <strong id="stat-unique">0</strong></span>
    <div class="spacer"></div>
    <button class="btn-clear" onclick="clearSession()">Clear Log</button>
  </div>
  <ul class="scan-log" id="scan-log"></ul>
  <div class="empty-state" id="scan-empty">
    <div class="icon">&#x1F4E6;</div>
    <p>Ready to scan. Focus the input above and scan a QR code.</p>
  </div>
</div>

<!-- ── Summary Tab ── -->
<div class="tab-content" id="tab-summary">
  <div class="summary-header">
    <h2>Receiving Summary</h2>
    <button class="btn-export" onclick="exportCurrentCSV()">Export CSV</button>
  </div>
  <div id="summary-content"></div>
</div>

<!-- ── History Tab ── -->
<div class="tab-content" id="tab-history">
  <div class="history-header">
    <h2>Session History</h2>
    <button class="btn-export" onclick="exportAllCSV()">Export All</button>
  </div>
  <div id="history-content"></div>
</div>

<script>
// ── Data ──
const STORAGE_KEY = 'sdc_scan_sessions';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { sessions: [], activeSessionId: null };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getActiveSession() {
  const data = loadData();
  if (!data.activeSessionId) return null;
  return data.sessions.find(s => s.id === data.activeSessionId) || null;
}

function ensureActiveSession() {
  const data = loadData();
  if (data.activeSessionId && data.sessions.find(s => s.id === data.activeSessionId)) {
    updateSessionNameInput();
    return;
  }
  const now = new Date();
  const id = 'session_' + Date.now();
  const name = 'Receiving ' + (now.getMonth() + 1) + '/' + now.getDate();
  data.sessions.push({
    id,
    name,
    created: now.toISOString(),
    scans: []
  });
  data.activeSessionId = id;
  saveData(data);
  updateSessionNameInput();
}

function updateSessionNameInput() {
  const session = getActiveSession();
  if (session) {
    document.getElementById('session-name').value = session.name;
  }
}

// ── Session Management ──
function newSession() {
  const name = prompt('Enter session name:', 'Receiving ' + (new Date().getMonth() + 1) + '/' + new Date().getDate());
  if (!name) return;
  const data = loadData();
  const id = 'session_' + Date.now();
  data.sessions.push({
    id,
    name,
    created: new Date().toISOString(),
    scans: []
  });
  data.activeSessionId = id;
  saveData(data);
  updateSessionNameInput();
  renderScanLog();
  updateScanStats();
  if (currentTab === 'summary') renderSummary();
  if (currentTab === 'history') renderHistory();
  document.getElementById('scan-input').focus();
}

function renameSession() {
  const data = loadData();
  const session = data.sessions.find(s => s.id === data.activeSessionId);
  if (session) {
    session.name = document.getElementById('session-name').value || session.name;
    saveData(data);
  }
}

function clearSession() {
  if (!confirm('Clear all scans in the current session?')) return;
  const data = loadData();
  const session = data.sessions.find(s => s.id === data.activeSessionId);
  if (session) {
    session.scans = [];
    saveData(data);
    renderScanLog();
    updateScanStats();
  }
}

// ── Tabs ──
let currentTab = 'scan';

function switchTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tabName));
  if (tabName === 'scan') {
    document.getElementById('scan-input').focus();
  } else if (tabName === 'summary') {
    renderSummary();
  } else if (tabName === 'history') {
    renderHistory();
  }
}

// ── Audio ──
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBeep(freq, duration) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.stop(ctx.currentTime + duration / 1000);
  } catch (e) {}
}

function successBeep() { playBeep(880, 100); }
function errorBeep() { playBeep(220, 200); }

// ── Visual Feedback ──
function flash(type) {
  const el = document.getElementById('scan-flash');
  el.className = 'scan-flash ' + type + ' show';
  requestAnimationFrame(() => {
    setTimeout(() => { el.classList.remove('show'); }, 30);
  });
}

// ── Scan Handler ──
document.getElementById('scan-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const raw = this.value.trim();
    if (!raw) return;

    const parts = raw.split(' | ');
    if (parts.length < 2) {
      flash('error');
      errorBeep();
      this.value = '';
      this.focus();
      return;
    }

    const sku = parts[0].trim();
    const name = parts[1].trim();
    const desc = parts.slice(2).join(' | ').trim();

    const data = loadData();
    const session = data.sessions.find(s => s.id === data.activeSessionId);
    if (!session) return;

    session.scans.push({
      timestamp: new Date().toISOString(),
      sku,
      name,
      desc
    });
    saveData(data);

    flash('success');
    successBeep();
    this.value = '';
    this.focus();
    renderScanLog();
    updateScanStats();
  }
});

// Re-focus scan input when clicking on scan tab
document.getElementById('tab-scan').addEventListener('click', function(e) {
  if (e.target.id !== 'scan-input' && !e.target.closest('button')) {
    document.getElementById('scan-input').focus();
  }
});

// ── Render Scan Log ──
function renderScanLog() {
  const session = getActiveSession();
  const log = document.getElementById('scan-log');
  const empty = document.getElementById('scan-empty');

  if (!session || session.scans.length === 0) {
    log.innerHTML = '';
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';

  // Build running counts
  const counts = {};
  const runningCounts = [];
  session.scans.forEach(scan => {
    counts[scan.sku] = (counts[scan.sku] || 0) + 1;
    runningCounts.push(counts[scan.sku]);
  });

  // Reverse chronological
  let html = '';
  for (let i = session.scans.length - 1; i >= 0; i--) {
    const scan = session.scans[i];
    const t = new Date(scan.timestamp);
    const time = pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    html += '<li class="scan-entry">' +
      '<span class="scan-time">' + time + '</span>' +
      '<span class="scan-sku">' + esc(scan.sku) + '</span>' +
      '<span class="scan-name">' + esc(scan.name) + '</span>' +
      '<span class="scan-count-badge">' + runningCounts[i] + 'x</span>' +
      '</li>';
  }
  log.innerHTML = html;
}

function updateScanStats() {
  const session = getActiveSession();
  const scans = session ? session.scans : [];
  const unique = new Set(scans.map(s => s.sku));
  document.getElementById('stat-total').textContent = scans.length;
  document.getElementById('stat-unique').textContent = unique.size;
}

// ── Summary ──
function renderSummary() {
  const session = getActiveSession();
  const container = document.getElementById('summary-content');

  if (!session || session.scans.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No scans in current session.</p></div>';
    return;
  }

  // Aggregate
  const agg = {};
  session.scans.forEach(scan => {
    if (!agg[scan.sku]) {
      agg[scan.sku] = { sku: scan.sku, name: scan.name, desc: scan.desc, count: 0, first: scan.timestamp, last: scan.timestamp };
    }
    agg[scan.sku].count++;
    if (scan.timestamp < agg[scan.sku].first) agg[scan.sku].first = scan.timestamp;
    if (scan.timestamp > agg[scan.sku].last) agg[scan.sku].last = scan.timestamp;
  });

  const rows = Object.values(agg).sort((a, b) => a.sku.localeCompare(b.sku));
  const totalUnits = rows.reduce((sum, r) => sum + r.count, 0);

  let html = '<table class="summary-table"><thead><tr>' +
    '<th>SDC SKU</th><th>Product Name</th><th>Description</th><th>Units</th><th>First Scan</th><th>Last Scan</th>' +
    '</tr></thead><tbody>';

  rows.forEach(r => {
    html += '<tr>' +
      '<td class="sku-cell">' + esc(r.sku) + '</td>' +
      '<td>' + esc(r.name) + '</td>' +
      '<td>' + esc(r.desc) + '</td>' +
      '<td>' + r.count + '</td>' +
      '<td class="time-cell">' + fmtTime(r.first) + '</td>' +
      '<td class="time-cell">' + fmtTime(r.last) + '</td>' +
      '</tr>';
  });

  html += '<tr class="total-row"><td></td><td></td><td><strong>Total</strong></td><td><strong>' + totalUnits + '</strong></td><td></td><td></td></tr>';
  html += '</tbody></table>';
  container.innerHTML = html;
}

// ── CSV ──
function sessionToCSV(session) {
  let csv = 'Session,Date,Time,SDC SKU,Product Name,Description,Quantity\n';
  session.scans.forEach(scan => {
    const d = new Date(scan.timestamp);
    const date = (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
    const time = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    csv += csvQ(session.name) + ',' + date + ',' + time + ',' +
      csvQ(scan.sku) + ',' + csvQ(scan.name) + ',' + csvQ(scan.desc) + ',1\n';
  });
  return csv;
}

function downloadCSV(content, filename) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportCurrentCSV() {
  const session = getActiveSession();
  if (!session || session.scans.length === 0) { alert('No scans to export.'); return; }
  const csv = sessionToCSV(session);
  const safeName = session.name.replace(/[^a-zA-Z0-9_-]/g, '_');
  downloadCSV(csv, 'sdc_receiving_' + safeName + '.csv');
}

function exportAllCSV() {
  const data = loadData();
  if (data.sessions.length === 0) { alert('No sessions to export.'); return; }
  let csv = 'Session,Date,Time,SDC SKU,Product Name,Description,Quantity\n';
  data.sessions.forEach(session => {
    session.scans.forEach(scan => {
      const d = new Date(scan.timestamp);
      const date = (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
      const time = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      csv += csvQ(session.name) + ',' + date + ',' + time + ',' +
        csvQ(scan.sku) + ',' + csvQ(scan.name) + ',' + csvQ(scan.desc) + ',1\n';
    });
  });
  downloadCSV(csv, 'sdc_receiving_all_sessions.csv');
}

function exportSessionCSV(idx) {
  const data = loadData();
  const session = data.sessions[idx];
  if (!session) return;
  const csv = sessionToCSV(session);
  const safeName = session.name.replace(/[^a-zA-Z0-9_-]/g, '_');
  downloadCSV(csv, 'sdc_receiving_' + safeName + '.csv');
}

function deleteSession(idx) {
  const data = loadData();
  const session = data.sessions[idx];
  if (!session) return;
  if (session.id === data.activeSessionId) { alert('Cannot delete the active session.'); return; }
  if (!confirm('Delete session "' + session.name + '"? This cannot be undone.')) return;
  data.sessions.splice(idx, 1);
  saveData(data);
  renderHistory();
}

// ── History ──
let expandedCards = new Set();

function renderHistory() {
  const data = loadData();
  const container = document.getElementById('history-content');

  if (data.sessions.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No sessions yet.</p></div>';
    return;
  }

  let html = '';
  // Reverse: newest first
  for (let i = data.sessions.length - 1; i >= 0; i--) {
    const session = data.sessions[i];
    const isActive = session.id === data.activeSessionId;
    const isExpanded = expandedCards.has(i);
    const d = new Date(session.created);
    const dateStr = (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
    const uniqueSkus = new Set(session.scans.map(s => s.sku)).size;

    html += '<div class="session-card' + (isExpanded ? ' expanded' : '') + '" data-idx="' + i + '">';
    html += '<div class="session-card-header" onclick="toggleSessionCard(' + i + ')">';
    html += '<span class="arrow">&#x25B6;</span>';
    html += '<span class="session-title">' + esc(session.name) + '</span>';
    html += '<span class="session-meta">';
    html += '<span>' + dateStr + '</span>';
    html += '<span>' + session.scans.length + ' scans</span>';
    html += '<span>' + uniqueSkus + ' products</span>';
    if (isActive) html += '<span class="badge-active">Active</span>';
    html += '</span></div>';

    html += '<div class="session-card-body">';
    if (session.scans.length > 0) {
      // Mini summary table
      const agg = {};
      session.scans.forEach(scan => {
        if (!agg[scan.sku]) agg[scan.sku] = { sku: scan.sku, name: scan.name, desc: scan.desc, count: 0, first: scan.timestamp, last: scan.timestamp };
        agg[scan.sku].count++;
        if (scan.timestamp < agg[scan.sku].first) agg[scan.sku].first = scan.timestamp;
        if (scan.timestamp > agg[scan.sku].last) agg[scan.sku].last = scan.timestamp;
      });
      const rows = Object.values(agg).sort((a, b) => a.sku.localeCompare(b.sku));

      html += '<table class="summary-table"><thead><tr><th>SKU</th><th>Product</th><th>Units</th><th>First</th><th>Last</th></tr></thead><tbody>';
      rows.forEach(r => {
        html += '<tr><td class="sku-cell">' + esc(r.sku) + '</td><td>' + esc(r.name) + '</td><td>' + r.count + '</td><td class="time-cell">' + fmtTime(r.first) + '</td><td class="time-cell">' + fmtTime(r.last) + '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p style="color:#999;font-size:13px;">No scans in this session.</p>';
    }

    html += '<div class="session-card-actions">';
    html += '<button class="btn-sm" onclick="exportSessionCSV(' + i + ')">Export CSV</button>';
    if (!isActive) html += '<button class="btn-sm danger" onclick="deleteSession(' + i + ')">Delete</button>';
    html += '</div></div></div>';
  }

  container.innerHTML = html;
}

function toggleSessionCard(idx) {
  if (expandedCards.has(idx)) expandedCards.delete(idx);
  else expandedCards.add(idx);
  renderHistory();
}

// ── Status Indicator ──
const scanInput = document.getElementById('scan-input');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

scanInput.addEventListener('focus', () => {
  statusDot.classList.add('active');
  statusText.textContent = 'Scanner Ready';
});

scanInput.addEventListener('blur', () => {
  statusDot.classList.remove('active');
  statusText.textContent = 'Click to activate';
});

// Session name change
document.getElementById('session-name').addEventListener('change', renameSession);

// ── Helpers ──
function pad(n) { return String(n).padStart(2, '0'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function csvQ(s) { return '"' + String(s).replace(/"/g, '""') + '"'; }
function fmtTime(iso) {
  const d = new Date(iso);
  return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

// ── Init ──
ensureActiveSession();
renderScanLog();
updateScanStats();
document.getElementById('scan-input').focus();
</script>
