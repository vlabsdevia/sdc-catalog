<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#111;--text:#333;--muted:#666;--bg:#f8f8f8;--surface:#fff;--border:#e5e5e5;--accent:#111;--radius:8px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--text);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:var(--primary);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:16px}
.logo-mark{width:36px;height:36px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--primary);flex-shrink:0}
.header-brand h1{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.header-brand p{font-size:12px;color:rgba(255,255,255,.6);font-weight:400}
.header-title{font-size:15px;font-weight:600;color:rgba(255,255,255,.85);border-left:1px solid rgba(255,255,255,.2);padding-left:16px}
.header-right{display:flex;align-items:center;gap:20px}
.header-stat{text-align:center}
.header-stat .num{font-size:20px;font-weight:700;line-height:1}
.header-stat .lbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
.back-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;font-weight:500;transition:color .15s}
.back-link:hover{color:#fff}

/* Toolbar */
.toolbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;flex-direction:column;gap:10px}
.toolbar-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#999}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pill .count{color:var(--muted);font-weight:400;margin-left:2px}
.pill.active .count{color:rgba(255,255,255,.6)}
.toolbar-bottom{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.search-input:focus{border-color:#999}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#333}
.qty-group{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.qty-input{width:56px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;text-align:center;outline:none}
.qty-input:focus{border-color:#999}

/* Two-panel layout */
.main{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 200px)}
.panel{padding:20px 24px;overflow-y:auto}
.panel-left{border-right:1px solid var(--border);max-height:calc(100vh - 200px);overflow-y:auto}
.panel-right{background:var(--bg);max-height:calc(100vh - 200px);overflow-y:auto}
.panel-header{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

/* Product List */
.product-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:background .1s;border:1px solid transparent}
.product-row:hover{background:rgba(0,0,0,.03)}
.product-row.selected{background:rgba(17,17,17,.06);border-color:var(--border)}
.product-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.product-sku{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-size:12px;font-weight:700;color:var(--primary);min-width:90px;flex-shrink:0}
.product-name{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-desc{font-size:11px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}

/* Preview */
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preview-label{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 8px;display:flex;align-items:center;gap:8px;height:72px;overflow:hidden}
.preview-qr{width:56px;height:56px;flex-shrink:0}
.preview-qr canvas,.preview-qr img{width:56px!important;height:56px!important}
.preview-info{flex:1;min-width:0;overflow:hidden}
.preview-sku{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:9px;font-weight:700;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-name{font-size:8px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.preview-desc{font-size:7px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.page-indicator{text-align:center;font-size:12px;color:var(--muted);margin:16px 0 8px;font-weight:500}
.no-selection{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}

/* Print styles */
@media print {
  @page{size:letter;margin:0}
  body *{visibility:hidden}
  .print-area,.print-area *{visibility:visible}
  .print-area{position:absolute;top:0;left:0;width:8.5in;z-index:9999}
  .label-page{width:8.5in;height:11in;padding:0.5in 0.15625in;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(10,1fr);column-gap:0.1875in;page-break-after:always;box-sizing:border-box}
  .label-page:last-child{page-break-after:auto}
  .print-label{width:4in;height:1in;display:flex;align-items:center;padding:0.0625in 0.1in;overflow:hidden;box-sizing:border-box}
  .print-label-qr{width:0.75in;height:0.75in;flex-shrink:0;margin-right:0.1in}
  .print-label-qr canvas,.print-label-qr img{width:0.75in!important;height:0.75in!important}
  .print-label-info{flex:1;min-width:0;overflow:hidden}
  .print-label-sku{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:8pt;font-weight:700;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .print-label-name{font-size:7pt;font-weight:500;color:#000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
  .print-label-desc{font-size:6pt;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
  .print-label.empty{visibility:hidden}
}

/* Screen-only print area hide */
@media screen {
  .print-area{display:none}
}
</style>

const catLabel = {
  togo: "To-Go Containers", steak: "Steak & Butcher", packaging: "Packaging Supplies",
  paper: "Paper Trays & Pans", cups: "Cups, Lids & Straws", tableware: "Tableware & Cutlery",
  food: "Food Containers", bags: "Bags & Produce", bakery: "Bakery Supplies",
  cleaning: "Protection & Cleaning"
};

// ── State ──
let activeCat = "all";
let searchTerm = "";
let selectedSkus = new Set();
let qtyPerLabel = 1;

// ── URL Params ──
(function parseURL() {
  const params = new URLSearchParams(window.location.search);
  const skusParam = params.get("skus");
  if (skusParam) {
    skusParam.split(",").forEach(s => {
      const sku = s.trim();
      if (sku && rows.some(r => r.sdc_sku === sku)) {
        selectedSkus.add(sku);
      }
    });
  }
})();

// ── Category Counts ──
function getCatCounts() {
  const counts = { all: rows.length };
  for (const r of rows) {
    counts[r.cat] = (counts[r.cat] || 0) + 1;
  }
  return counts;
}

// ── 1. Render Pills ──
function renderPills() {
  const counts = getCatCounts();
  const pillsEl = document.getElementById("pills");
  let html = `<button class="pill ${activeCat === 'all' ? 'active' : ''}" onclick="setCat('all')">All <span class="count">(${counts.all})</span></button>`;
  for (const [key, label] of Object.entries(catLabel)) {
    html += `<button class="pill ${activeCat === key ? 'active' : ''}" onclick="setCat('${key}')">${label} <span class="count">(${counts[key] || 0})</span></button>`;
  }
  pillsEl.innerHTML = html;
}

function setCat(cat) {
  activeCat = cat;
  renderPills();
  renderProductList();
}

// ── 2. Get Filtered Rows ──
function getFilteredRows() {
  let filtered = rows;
  if (activeCat !== "all") {
    filtered = filtered.filter(r => r.cat === activeCat);
  }
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(r =>
      r.sdc_sku.toLowerCase().includes(q) ||
      r.name.toLowerCase().includes(q) ||
      r.desc.toLowerCase().includes(q)
    );
  }
  return filtered;
}

// ── 3. Render Product List ──
function renderProductList() {
  const filtered = getFilteredRows();
  const listEl = document.getElementById("productList");
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="no-selection">No products match your filters</div>';
    return;
  }
  let html = "";
  for (const r of filtered) {
    const checked = selectedSkus.has(r.sdc_sku);
    html += `<div class="product-row ${checked ? 'selected' : ''}" onclick="toggleProduct('${r.sdc_sku}')">
      <input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation(); toggleProduct('${r.sdc_sku}')">
      <span class="product-sku">${r.sdc_sku}</span>
      <span class="product-name">${escHtml(r.name)}</span>
      <span class="product-desc">${escHtml(r.desc)}</span>
    </div>`;
  }
  listEl.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── 4. Toggle Product ──
function toggleProduct(sku) {
  if (selectedSkus.has(sku)) {
    selectedSkus.delete(sku);
  } else {
    selectedSkus.add(sku);
  }
  renderProductList();
  updateStats();
  updatePreview();
}

// ── 5. Select All / Deselect All ──
function selectAll() {
  const filtered = getFilteredRows();
  for (const r of filtered) {
    selectedSkus.add(r.sdc_sku);
  }
  renderProductList();
  updateStats();
  updatePreview();
}

function deselectAll() {
  selectedSkus.clear();
  renderProductList();
  updateStats();
  updatePreview();
}

// ── 6. Update Stats ──
function updateStats() {
  const qty = parseInt(document.getElementById("qtyInput").value) || 1;
  qtyPerLabel = qty;
  document.getElementById("statTotal").textContent = rows.length;
  document.getElementById("statSelected").textContent = selectedSkus.size;
  document.getElementById("statLabels").textContent = selectedSkus.size * qty;
}

// ── 7. Update Preview ──
function updatePreview() {
  const previewEl = document.getElementById("previewArea");
  const selected = rows.filter(r => selectedSkus.has(r.sdc_sku));
  const qty = parseInt(document.getElementById("qtyInput").value) || 1;

  if (selected.length === 0) {
    previewEl.innerHTML = '<div class="no-selection">Select products to preview labels</div>';
    return;
  }

  // Build flat label array
  const labels = [];
  for (const r of selected) {
    for (let i = 0; i < qty; i++) {
      labels.push(r);
    }
  }

  const pages = [];
  for (let i = 0; i < labels.length; i += 20) {
    pages.push(labels.slice(i, i + 20));
  }

  let html = "";
  pages.forEach((page, pi) => {
    html += `<div class="page-indicator">Page ${pi + 1} of ${pages.length}</div>`;
    html += '<div class="preview-grid">';
    for (const r of page) {
      const qrId = `prev-qr-${r.sdc_sku}-${pi}-${Math.random().toString(36).substr(2,6)}`;
      html += `<div class="preview-label">
        <div class="preview-qr" id="${qrId}"></div>
        <div class="preview-info">
          <div class="preview-sku">${r.sdc_sku}</div>
          <div class="preview-name">${escHtml(r.name)}</div>
          <div class="preview-desc">${escHtml(r.desc)}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  });

  previewEl.innerHTML = html;

  // Generate QR codes for preview
  requestAnimationFrame(() => {
    previewEl.querySelectorAll(".preview-qr").forEach(el => {
      const label = el.closest(".preview-label");
      const sku = label.querySelector(".preview-sku").textContent;
      const name = label.querySelector(".preview-name").textContent;
      const desc = label.querySelector(".preview-desc").textContent;
      const qrText = `${sku} | ${name} | ${desc}`;
      try {
        new QRCode(el, {
          text: qrText,
          width: 56,
          height: 56,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch(e) {}
    });
  });
}

// ── 8. Print Labels ──
function printLabels() {
  const selected = rows.filter(r => selectedSkus.has(r.sdc_sku));
  const qty = parseInt(document.getElementById("qtyInput").value) || 1;

  if (selected.length === 0) {
    alert("Please select at least one product.");
    return;
  }

  // Build flat label array
  const labels = [];
  for (const r of selected) {
    for (let i = 0; i < qty; i++) {
      labels.push(r);
    }
  }

  // Split into pages of 20
  const pages = [];
  for (let i = 0; i < labels.length; i += 20) {
    pages.push(labels.slice(i, i + 20));
  }

  const printArea = document.getElementById("printArea");
  let html = "";

  for (const page of pages) {
    html += '<div class="label-page">';
    for (let i = 0; i < 20; i++) {
      if (i < page.length) {
        const r = page[i];
        const qrId = `print-qr-${r.sdc_sku}-${i}-${Math.random().toString(36).substr(2,6)}`;
        html += `<div class="print-label">
          <div class="print-label-qr" id="${qrId}"></div>
          <div class="print-label-info">
            <div class="print-label-sku">${r.sdc_sku}</div>
            <div class="print-label-name">${escHtml(r.name)}</div>
            <div class="print-label-desc">${escHtml(r.desc)}</div>
          </div>
        </div>`;
      } else {
        html += '<div class="print-label empty"></div>';
      }
    }
    html += '</div>';
  }

  printArea.innerHTML = html;

  // Generate QR codes for print
  requestAnimationFrame(() => {
    printArea.querySelectorAll(".print-label-qr").forEach(el => {
      const label = el.closest(".print-label");
      if (label.classList.contains("empty")) return;
      const sku = label.querySelector(".print-label-sku").textContent;
      const name = label.querySelector(".print-label-name").textContent;
      const desc = label.querySelector(".print-label-desc").textContent;
      const qrText = `${sku} | ${name} | ${desc}`;
      try {
        new QRCode(el, {
          text: qrText,
          width: 72,
          height: 72,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch(e) {}
    });

    // Wait for QR codes to render, then print
    setTimeout(() => {
      window.print();
    }, 500);
  });
}

// ── 9. Search Handler ──
document.getElementById("searchInput").addEventListener("input", function(e) {
  searchTerm = e.target.value.trim();
  renderProductList();
});

document.getElementById("qtyInput").addEventListener("change", function() {
  updateStats();
  if (selectedSkus.size > 0) updatePreview();
});

// ── 10. Init ──
renderPills();
renderProductList();
updateStats();
if (selectedSkus.size > 0) updatePreview();
</script>
